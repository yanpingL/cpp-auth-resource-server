services:
  web1:
    image: webserver-web-dev:latest
    container_name: sys-web-1
    volumes:
      - ./workspace:/workspace
    depends_on:
      - mysql
      - redis
    ports:
      - "8081:8080"
    stdin_open: true
    tty: true
  
  web2:
    image: webserver-web-dev:latest
    container_name: sys-web-2
    volumes:
      - ./workspace:/workspace
    depends_on:
      - mysql
      - redis
    ports:
      - "8082:8080"
    stdin_open: true
    tty: true

  nginx:
    image: nginx:latest
    container_name: sys-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web1
      - web2
  
  mysql: #  Newly added database service
    image: mysql:8.0
    container_name: sys-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: webdb
      MYSQL_USER: webuser
      MYSQL_PASSWORD: webpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  
  redis: # Newly added Redis service
    image: redis:7
    container_name: sys-redis
    ports: 
      - "6379:6379"


volumes:
  mysql_data:
