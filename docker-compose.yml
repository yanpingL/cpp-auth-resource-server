services:
  web1:
    build:
      context: .
      dockerfile: Dockerfile
    image: webserver-web-dev:latest
    container_name: sys-web-1
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: webdb
      POSTGRES_USER: webuser
      POSTGRES_PASSWORD: webpass123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: webserver-files
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_UPLOAD_URL_EXPIRES: 300
      MINIO_DOWNLOAD_URL_EXPIRES: 300
      MINIO_MAX_FILENAME_LENGTH: 255
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8081:8080"  #external port 8081 mapped into internal container port 8080
    stdin_open: true
    tty: true
  
  web2:
    build:
      context: .
      dockerfile: Dockerfile
    image: webserver-web-dev:latest
    container_name: sys-web-2
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: webdb
      POSTGRES_USER: webuser
      POSTGRES_PASSWORD: webpass123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: webserver-files
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_UPLOAD_URL_EXPIRES: 300
      MINIO_DOWNLOAD_URL_EXPIRES: 300
      MINIO_MAX_FILENAME_LENGTH: 255
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8082:8080"
    stdin_open: true
    tty: true

  nginx:
    image: nginx:latest
    container_name: sys-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
  
  postgres:
    image: postgres:16
    container_name: sys-postgres
    restart: always
    environment:
      POSTGRES_DB: webdb
      POSTGRES_USER: webuser
      POSTGRES_PASSWORD: webpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis: # Newly added Redis service
    image: redis:7
    container_name: sys-redis
    ports: 
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: sys-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data


volumes:
  postgres_data:
  minio_data:
