name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker environment
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: webserver-web-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start build containers
        run: docker compose up -d --no-build web1 web2

      - name: Configure CMake in web1
        run: docker exec sys-web-1 bash -lc "cd /workspace && cmake -S . -B build"

      - name: Configure CMake in web2
        run: docker exec sys-web-2 bash -lc "cd /workspace && cmake -S . -B build"

      - name: Build C++ targets in web1
        run: docker exec sys-web-1 bash -lc "cd /workspace && cmake --build build --parallel 2"

      - name: Build C++ targets in web2
        run: docker exec sys-web-2 bash -lc "cd /workspace && cmake --build build --parallel 2"

      - name: Run C++ unit tests in web1
        run: docker exec sys-web-1 bash -lc "cd /workspace && ctest --test-dir build --output-on-failure"

      - name: Stop Docker environment
        if: always()
        run: docker compose down -v
